apis:
  - aid: alcohol-and-tobacco-tax-and-trade-bureau:ttb-open-data-api
    name: TTB Open Data API
    tags:
      - Open Data
      - Socrata
      - Excise Tax
    humanURL: https://www.ttb.gov/open-government/open-data
    description: >-
      The TTB Open Data API provides programmatic access to TTB statistical and
      regulatory datasets via the Socrata Open Data API (SODA). Available
      datasets include alcohol beverage tax collections by commodity and state,
      federal basic permit holders, approved Certificate of Label Approval (COLA)
      records, and brewery/winery/distillery permit data. The SODA API supports
      filtering, sorting, pagination, and JSON/CSV output formats.
    properties:
      - type: DataAPI
        url: https://data.ttb.gov/resource/

  - aid: alcohol-and-tobacco-tax-and-trade-bureau:ttb-cola-registry
    name: TTB COLA Registry
    tags:
      - Alcohol Beverage Labels
      - COLA
      - Open Data
    humanURL: https://www.ttb.gov/labeling/cola-registry
    description: >-
      The TTB Public COLA (Certificate of Label Approval) Registry provides
      access to approved alcohol beverage labels. Users and industry members
      can search for approved labels by product type, brand name, filer name,
      and approval date. The registry covers wine, distilled spirits, and malt
      beverage label approvals required before commercial sale in interstate or
      foreign commerce.
    properties:
      - type: DataAPI
        url: https://www.ttb.gov/labeling/cola-registry

  - aid: alcohol-and-tobacco-tax-and-trade-bureau:ttb-permits-online
    name: TTB Permits Online
    tags:
      - Permits
      - Licensing
      - Alcohol
      - Tobacco
    humanURL: https://www.ttb.gov/permitting/permits-online
    description: >-
      TTB Permits Online is the electronic portal for applying for and managing
      federal basic permits, brewer's notices, distilled spirits plant permits,
      and tobacco permits. The system allows industry members to submit permit
      applications, file operational reports, and pay federal excise taxes
      electronically. Permit status and holder data are published as open data.
    properties:
      - type: GovernmentAPI
        url: https://www.ttb.gov/permitting/permits-online

