description: >-
  The Alcohol and Tobacco Tax and Trade Bureau (TTB), statutorily named the Tax
  and Trade Bureau, is a bureau of the United States Department of the Treasury.
  TTB regulates and collects federal excise taxes on alcohol, tobacco, firearms,
  and ammunition. The bureau enforces Federal laws and regulations related to
  alcohol and tobacco products, issues permits for producers, importers, and
  wholesalers, approves label applications for alcohol beverages, and provides
  open data on tax collections, permit holders, and approved product labels.
  TTB administers approximately $20 billion in annual federal excise tax
  collections from the alcohol and tobacco industries.
